backend:
  name: git-gateway
  branch: main

site_url: https://bodrum-properties-ltd.netlify.app
display_url: https://bodrum-properties-ltd.netlify.app

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "data"
    label: "Site Content"
    files:
      - name: "properties"
        label: "Properties"
        file: "_data/properties.yml"
        fields:
          - label: "Properties"
            name: "items"
            widget: "list"
            allow_add: true
            fields:
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Address", name: "address", widget: "string" }
              - { label: "Bedrooms", name: "beds", widget: "number", value_type: "int" }
              - { label: "Bathrooms", name: "baths", widget: "number", value_type: "int" }
              - { label: "Area (sqm)", name: "area", widget: "number", value_type: "int" }
              - { label: "Status", name: "status", widget: "select", options: ["Available", "Lease Option", "Completed"] }
              - { label: "Badge Class", name: "badge_class", widget: "select", options: ["badge-available", "badge-lease", "badge-sold"] }
              - { label: "Image", name: "image", widget: "image", required: false }
      - name: "testimonials"
        label: "Testimonials"
        file: "_data/testimonials.yml"
        fields:
          - label: "Testimonials"
            name: "items"
            widget: "list"
            allow_add: true
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Avatar Letter", name: "avatar", widget: "string" }
              - { label: "Testimonial Text", name: "text", widget: "text" }
      - name: "videos"
        label: "Videos"
        file: "_data/videos.yml"
        fields:
          - label: "Videos"
            name: "items"
            widget: "list"
            allow_add: true
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Video File", name: "src", widget: "file" }
              - { label: "Tag", name: "tag", widget: "string" }
